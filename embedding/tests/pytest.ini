[pytest]
asyncio_mode = auto
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test discovery patterns
norecursedirs = .git __pycache__ *.egg

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short

# Markers
markers =
    asyncio: marks tests as async (using pytest-asyncio)
    integration: marks tests as integration tests (require real Qdrant)
    unit: marks tests as unit tests
    slow: marks tests as slow running
    gpu: marks tests as requiring GPU

# Add semantic_pipeline to Python path for imports
pythonpath = ../..

