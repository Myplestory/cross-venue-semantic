[pytest]
asyncio_mode = auto
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

norecursedirs = .git __pycache__ *.egg

addopts = 
    -v
    --strict-markers
    --tb=short

markers =
    asyncio: marks tests as async (using pytest-asyncio)
    integration: marks tests as integration tests (require real Qdrant)
    unit: marks tests as unit tests
    slow: marks tests as slow running (>1 second)
    performance: marks tests as performance benchmarks
    mps: marks tests specific to MPS device (M4 Mac)
    real_model: marks tests that load real ML models

