[pytest]
asyncio_mode = auto
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test discovery patterns
norecursedirs = .git __pycache__ *.egg

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    asyncio: marks tests as async (using pytest-asyncio)
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    slow: marks tests as slow running

# Coverage (if pytest-cov is installed)
# addopts = --cov=discovery --cov-report=html --cov-report=term
