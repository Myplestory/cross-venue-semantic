[pytest]
asyncio_mode = auto
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

norecursedirs = .git __pycache__ *.egg

addopts = 
    -v
    --strict-markers
    --tb=short

# Add semantic_pipeline to Python path for imports
pythonpath = ../..

markers =
    asyncio: marks tests as async (using pytest-asyncio)
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    slow: marks tests as slow running (>1 second)
    performance: marks tests as performance benchmarks

